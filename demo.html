<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Center Lightbox - Scroll Enabled</title>

    <!-- Bootstrap Core CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="css/grayscale.css" rel="stylesheet">

      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.2.0/css/font-awesome.css" integrity="sha512-YTuMx+CIxXa1l+j5aDPm98KFbVcYFNhlr2Auha3pwjHCF1lLbY9/ITQQlsUzdM1scW45kHC5KNib4mNa1IFvJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">

    <style>
       
        
       
/* --- 4. FILTER NAVIGATION --- */
.filter-nav {
  margin-bottom: 50px;
  text-align: center;
}

.filter-btn {
  background: transparent;
  border: 1px solid #42dca3;
  color: #42dca3;
  padding: 10px 22px;
  margin: 4px;
  border-radius: 0;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 1px;
  transition: all 0.3s ease;
  outline: none !important;
}

.filter-btn:hover,
.filter-btn.active {
  background: #42dca3;
  color: #000;
}

/* --- 5. GALLERY GRID (Proportionate Gaps Fix) --- */
.gallery-grid {
  /* Negative margins balance out item padding to keep edges flush */
  margin-left: -10px !important;
  margin-right: -10px !important;
  min-height: 200px;
}

.gallery-item {
  /* Equal padding creates the "proportionate" gap your client wants */
  padding-left: 10px !important;
  padding-right: 10px !important;
  margin-bottom: 20px;
}

.img-container {
  position: relative;
  overflow: hidden;
  background: #000;
}

.img-container img {
  width: 100%;
  height: auto;
  display: block;
  transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.hover-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.39);
  opacity: 0;
  transition: all 0.4s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.img-container:hover img { transform: scale(1.08); }
.img-container:hover .hover-overlay { opacity: 1; }
.hover-overlay i { color: #fff; font-size: 24px; }

/* --- 6. LIGHTBOX 2 OVERRIDES (Fixed & Centered) --- */
.lightboxOverlay {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 9999 !important;
}

.lightbox {
  position: fixed !important;
  /* Keep centered regardless of page scroll */
  top: 50% !important;
  left: 50% !important;
  transform: translate(-50%, -50%) !important;
  margin-top: 0 !important; 
  z-index: 10000 !important;
}

/* Lightbox UI Polish */
.lb-outerContainer { 
  background-color: #000 !important; 
  border-radius: 0 !important; 
}

.lb-dataContainer {
  background-color: #000 !important;
  padding-top: 10px;
}

.lb-caption {
  font-family: Montserrat, sans-serif;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 1px;
  color: #fff !important;
}

.lb-number {
  color: #42dca3 !important;
  font-size: 10px;
}

    </style>
</head>
<body>


    <div class="">
        <div class="container">
            <div class="hero-section text-center">
                    <h1>OUR PORTFOLIOS</h1>
                <a href="#portfolio-sec" class="btn btn-circle page-scroll" style="margin-bottom:80px;">
                    <i class="fa fa-angle-double-down animated"></i>
                </a>
            </div>
        </div>
    </div>






<div class="container" id="portfolio-sec">
    <div class="row">
        <div class="col-xs-12">
            <div class="filter-nav">
                <button class="filter-btn active" data-filter="*">All</button>
                <button class="filter-btn" data-filter="gbp">Gameboy Pocket</button>
                <button class="filter-btn" data-filter="gba">Gameboy Advance</button>
                <button class="filter-btn" data-filter="sp">GBA SP</button>
                <button class="filter-btn" data-filter="nds">NDS Lite</button>
                <button class="filter-btn" data-filter="other">Others</button>
            </div>
        </div>
    </div>
    <div id="js-gallery-grid" class="row gallery-grid"></div>
</div>


    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p>Copyright &copy; Your Website 2014</p>
        </div>
    </footer>



    <script src="js/jquery.js"></script>
    <!-- Bootstrap Core JavaScript -->
    <script src="js/bootstrap.min.js"></script>
    <!-- Plugin JavaScript -->
    <script src="js/jquery.easing.min.js"></script>
<script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.imagesloaded/4.1.4/imagesloaded.pkgd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>

    <!-- Custom Theme JavaScript -->
    <script src="js/grayscale.js"></script>

<script>
const galleryConfig = {
    // These keys (gbp, gba, etc.) MUST match the data-filter values above.
    // Replace 'https://placehold.net/default.png' with your actual image paths.
    
    gbp: {
        title: "Gameboy Pocket",
        images: [
            "img/gameboy-advance/gameboy-advance.png", 
            "img/gameboy-advance/gameboy-advance.png", 
            "img/gameboy-advance/gameboy-advance.png", 
            "img/gameboy-advance/gameboy-advance.png"
        ]
    },
    gba: {
        title: "Gameboy Advance",
        images: [
            "img/gameboy-pocket/gameboy-pocket.png",
            "img/gameboy-pocket/gameboy-pocket.png",
            "img/gameboy-pocket/gameboy-pocket.png",
            "img/gameboy-pocket/gameboy-pocket.png"
        ]
    },
    sp: {
        title: "GBA SP",
        images: [
            "img/gba-sp/gba-sp.png",
            "img/gba-sp/gba-sp.png",
            "img/gba-sp/gba-sp.png",
            "img/gba-sp/gba-sp.png"
        ]
    },
    nds: {
        title: "NDS Lite",
        images: [
            "img/nds-lite/nds-lite.png",
            "img/nds-lite/nds-lite.png",
            "img/nds-lite/nds-lite.png",
            "img/nds-lite/nds-lite.png"
        ]
    },
    other: {
        title: "Others",
        images: [
            "img/others/others.png",
            "img/others/others.png",
            "img/others/others.png",
            "img/others/others.png"
        ]
    }
};

$(document).ready(function(){
    const $container = $('#js-gallery-grid');

    // Generate HTML from JSON
    let allItems = [];
    $.each(galleryConfig, function(category, content) {
        content.images.forEach((path, i) => {
            allItems.push(`
                <div class="col-md-3 col-sm-6 col-xs-6 gallery-item ${category}">
                    <a href="${path}" data-lightbox="console-gallery" data-title="${content.title}">
                        <div class="img-container">
                            <img src="${path}" class="img-responsive">
                            <div class="hover-overlay"><i class="fa fa-plus"></i></div>
                        </div>
                    </a>
                </div>`);
        });
    });

    // Shuffle images once
    for (let i = allItems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allItems[i], allItems[j]] = [allItems[j], allItems[i]];
    }
    $container.append(allItems.join(''));

    // Initialize Isotope
    var $grid = $container.isotope({ 
        itemSelector: '.gallery-item', 
        layoutMode: 'fitRows' 
    });

    // Re-layout after images load
    $grid.imagesLoaded().progress(() => $grid.isotope('layout'));

// --- UPDATED FILTER NAVIGATION ---
    $('.filter-btn').on('click', function() {
        $('.filter-btn').removeClass('active');
        $(this).addClass('active');
        
        const f = $(this).attr('data-filter');
        
        // 1. Run Isotope Filter
        $grid.isotope({ filter: f === '*' ? '*' : '.' + f });

        // 2. FIX: Dynamic Lightbox Grouping
        // This ensures the popup only shows images from the active tab
        if (f === '*') {
            // If "All" is selected, group everything under one name
            $('.gallery-item a').attr('data-lightbox', 'console-gallery');
        } else {
            // Set filtered items to a unique group name
            // Set hidden items to a different name so they don't show in popup
            $('.gallery-item a').attr('data-lightbox', 'hidden-gallery'); 
            $('.' + f + ' a').attr('data-lightbox', f + '-gallery');
        }
    });

    // Lightbox Configuration
    lightbox.option({ 
        'resizeDuration': 0,          // STOP the shaking by making resize instant
        'fadeDuration': 200,          // Quick fade is smoother than a slow jump
        'imageFadeDuration': 200, 
        'disableScrolling': false, 
        'alwaysShowNavOnTouchDevices': true, 
        'wrapAround': true,
        'positionFromTop': 0
    });
});
</script>

</body>
</html>
